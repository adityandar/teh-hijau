<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teh Hijau — Silhouette Album Cover</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>TEH HIJAU</h1>
    <p>Ubah fotomu jadi silhouette cover lagu minimalis yang lagi viral.</p>
</header>

<main>
    <div class="status-bar loading" id="statusBar">
        <div class="status-dot"></div>
        <span id="statusText">Loading MediaPipe&hellip;</span>
    </div>

    <div class="main-card">
        <div class="upload-zone" id="uploadZone">
            <span class="icon">&#128247;</span>
            <span class="text">Drop, paste, or <strong>browse</strong> a photo</span>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-area" id="previewArea" style="display:none">
            <canvas id="resultCanvas" width="420" height="420"></canvas>
            <canvas id="originalCanvas" width="420" height="420" style="display:none"></canvas>
            <button class="btn btn-secondary hold-btn" id="holdBtn" style="display:none">Hold to see original</button>
        </div>
    </div>

    <div class="controls">
        <h2>Adjustments</h2>
        <div class="control-row">
            <div class="control-group">
                <label>Smooth Edges <span id="smoothVal">5px</span></label>
                <input type="range" min="0" max="8" value="5" id="smoothSlider" disabled>
            </div>
            <div class="control-group">
                <label>Subject Size <span id="scaleVal">90%</span></label>
                <input type="range" min="30" max="100" value="90" id="scaleSlider" disabled>
            </div>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="invertToggle" checked>
            <label for="invertToggle">Invert mask</label>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="downloadBtn" disabled>Download PNG</button>
        <button class="btn btn-secondary" id="resetBtn" disabled>Reset</button>
    </div>
</main>

<footer style="text-align:center; padding: 0 1rem 2rem; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;">
    Created by <a href="https://linkedin.com/in/adityandar" target="_blank" rel="noopener" style="color: var(--black); text-underline-offset: 3px;">@adityandar</a>
</footer>

<div class="toast" id="toast"></div>

<script type="module" src="js/main.js"></script>

</body>
</html>
