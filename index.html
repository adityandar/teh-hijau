<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teh Hijau — Silhouette Album Cover</title>
<style>
:root {
    --accent: #9AA84A;
    --yellow: #FFD600;
    --pink: #FF5E8A;
    --cyan: #00D4C8;
    --black: #1a1a1a;
    --white: #fffef7;
    --muted: #777;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--white);
    color: var(--black);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
}
header { text-align: center; padding: 2.5rem 1rem 1.5rem; }
header h1 {
    font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em;
    display: inline-block; background: var(--yellow);
    padding: 0.2rem 1rem; border: 3px solid var(--black);
    box-shadow: 4px 4px 0 var(--black);
}
header p { margin-top: 0.5rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
main { width: 100%; max-width: 600px; padding: 0 1rem 2.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

.status-bar {
    background: var(--white); border: 3px solid var(--black);
    padding: 0.55rem 0.75rem; display: flex; align-items: center; gap: 0.45rem;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em;
    box-shadow: 4px 4px 0 var(--black);
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--black); flex-shrink: 0; border: 2px solid var(--black); }
.status-bar.success .status-dot { background: var(--accent); }
.status-bar.loading .status-dot { animation: pulse 0.8s infinite; }

/* ---- main card ---- */
.main-card {
    background: var(--white); border: 4px solid var(--black);
    padding: 1rem; box-shadow: 6px 6px 0 var(--black);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
}
.upload-zone {
    border: 3px dashed var(--black); padding: 2.5rem 1.5rem; text-align: center;
    cursor: pointer; width: 100%; transition: background 0.15s;
}
.upload-zone:hover { background: var(--yellow); }
.upload-zone .icon { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
.upload-zone .text { font-size: 0.9rem; font-weight: 500; }
.upload-zone .text strong { background: var(--yellow); padding: 0.1rem 0.3rem; border: 2px solid var(--black); font-weight: 700; }
.upload-zone input[type=file] { display: none; }

.preview-area { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 0.5rem; }
.preview-area canvas {
    width: 100%; max-width: 480px; aspect-ratio: 1;
    border: 3px solid var(--black); display: block;
}
.hold-btn {
    font-size: 0.72rem !important;
    padding: 0.4rem 1rem !important;
}

/* ---- controls ---- */
.controls {
    background: var(--white); border: 4px solid var(--black);
    padding: 1.25rem; box-shadow: 5px 5px 0 var(--black);
}
.controls h2 {
    font-size: 0.8rem; margin-bottom: 0.85rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    display: inline-block; background: var(--cyan); padding: 0.1rem 0.5rem;
    border: 2px solid var(--black);
}
.control-row { display: flex; flex-wrap: wrap; gap: 1rem; }
.control-group { flex: 1; min-width: 140px; }
.control-group label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.75rem; margin-bottom: 0.3rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.03em;
}
.control-group label span { background: var(--black); color: var(--white); padding: 0.08rem 0.35rem; font-size: 0.65rem; font-weight: 700; }
.control-group input[type=range] { width: 100%; accent-color: var(--accent); border: 2px solid var(--black); border-radius: 0; height: 6px; background: var(--white); }

.toggle-row { display: flex; align-items: center; gap: 0.45rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 0.75rem; }
.toggle-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; }

/* ---- buttons ---- */
.actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
.btn {
    padding: 0.6rem 1.5rem; border: 3px solid var(--black);
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    text-transform: uppercase; letter-spacing: 0.04em;
}
.btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--black); }
.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 var(--black); }
.btn-primary { background: var(--yellow); color: var(--black); box-shadow: 4px 4px 0 var(--black); }
.btn-primary:hover:not(:disabled) { background: #FFE540; }
.btn-secondary { background: var(--white); color: var(--black); box-shadow: 4px 4px 0 var(--black); }
.btn-secondary:hover:not(:disabled) { background: #f0ede0; }

.toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: var(--white); padding: 0.55rem 1.4rem;
    border: 3px solid var(--black); box-shadow: 4px 4px 0 var(--black);
    font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.04em;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

@media (max-width: 480px) {
    header h1 { font-size: 1.5rem; }
    header p { font-size: 0.72rem; }
    .control-group { min-width: 120px; }
    .upload-zone { padding: 2rem 1rem; }
    .btn { padding: 0.55rem 1rem; font-size: 0.78rem; }
}
</style>
</head>
<body>

<header>
    <h1>TEH HIJAU</h1>
    <p>Silhouette Album Cover Generator</p>
</header>

<main>
    <div class="status-bar loading" id="statusBar">
        <div class="status-dot"></div>
        <span id="statusText">Loading MediaPipe&hellip;</span>
    </div>

    <div class="main-card">
        <div class="upload-zone" id="uploadZone">
            <span class="icon">&#128247;</span>
            <span class="text">Drop, paste, or <strong>browse</strong> a photo</span>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="preview-area" id="previewArea" style="display:none">
            <canvas id="resultCanvas" width="420" height="420"></canvas>
            <canvas id="originalCanvas" width="420" height="420" style="display:none"></canvas>
            <button class="btn btn-secondary hold-btn" id="holdBtn" style="display:none">Hold to see original</button>
        </div>
    </div>

    <div class="controls">
        <h2>Adjustments</h2>
        <div class="control-row">
            <div class="control-group">
                <label>Smooth Edges <span id="smoothVal">5px</span></label>
                <input type="range" min="0" max="8" value="5" id="smoothSlider" disabled>
            </div>
            <div class="control-group">
                <label>Subject Size <span id="scaleVal">90%</span></label>
                <input type="range" min="30" max="100" value="90" id="scaleSlider" disabled>
            </div>
        </div>
        <div class="toggle-row">
            <input type="checkbox" id="invertToggle" checked>
            <label for="invertToggle">Invert mask</label>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="downloadBtn" disabled>Download PNG</button>
        <button class="btn btn-secondary" id="resetBtn" disabled>Reset</button>
    </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
let mpFS = null;
let mpIS = null;

import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs')
    .then(function(mp) {
        mpFS = mp.FilesetResolver;
        mpIS = mp.ImageSegmenter;
        initMediaPipe();
    })
    .catch(function(e) {
        console.warn('MediaPipe import failed:', e.message);
        state.mediaPipeFailed = true;
        updateStatusBar();
    });

const BG = '#9AA84A';
const OUT = 1024;

const state = {
    originalImage: null,
    workImageData: null,
    maskData: null,
    resultCanvas: null,
    debounceTimer: null,
    toastTimer: null,
    segmenter: null,
    mediaPipeReady: false,
    mediaPipeFailed: false,
    mediaPipeLoading: false,
};

function getSettings() {
    return {
        smoothRadius: parseInt($('smoothSlider').value),
        subjectScale: parseInt($('scaleSlider').value),
        invert: $('invertToggle').checked,
    };
}

function $(id) { return document.getElementById(id); }
const uploadZone = $('uploadZone');
const previewArea = $('previewArea');
const fileInput = $('fileInput');
const resultCanvas = $('resultCanvas');
const originalCanvas = $('originalCanvas');
const holdBtn = $('holdBtn');

function updateStatusBar() {
    const bar = $('statusBar');
    const text = $('statusText');
    if (state.mediaPipeLoading) {
        bar.className = 'status-bar loading';
        text.textContent = 'Loading segmentation model...';
    } else if (state.mediaPipeReady) {
        bar.className = 'status-bar success';
        text.textContent = 'MediaPipe ready — person segmentation active';
    } else if (state.mediaPipeFailed) {
        bar.className = 'status-bar error';
        text.textContent = 'ML unavailable. Serve via HTTP:  npx serve .';
    }
}

async function initMediaPipe() {
    if (!mpFS || !mpIS || state.mediaPipeReady || state.mediaPipeLoading) return;
    state.mediaPipeLoading = true;
    updateStatusBar();
    try {
        const vision = await mpFS.forVisionTasks(
            'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm/'
        );
        state.segmenter = await mpIS.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/image_segmenter/selfie_segmenter/float16/latest/selfie_segmenter.tflite',
            },
            runningMode: 'IMAGE',
            outputCategoryMask: true,
        });
        state.mediaPipeReady = true;
        showToast('ML model ready');
    } catch (e) {
        console.warn('MediaPipe init failed:', e);
        state.mediaPipeFailed = true;
    }
    state.mediaPipeLoading = false;
    updateStatusBar();
}

function handleFile(file) {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            state.originalImage = img;
            const maxDim = 800;
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
                const s = maxDim / Math.max(w, h);
                w = Math.round(w * s);
                h = Math.round(h * s);
            }
            const wc = document.createElement('canvas');
            wc.width = w; wc.height = h;
            const wctx = wc.getContext('2d');
            wctx.drawImage(img, 0, 0, w, h);
            state.workImageData = wctx.getImageData(0, 0, w, h);

            uploadZone.style.display = 'none';
            previewArea.style.display = 'flex';
            holdBtn.style.display = 'inline-block';

            $('downloadBtn').disabled = false;
            $('resetBtn').disabled = false;
            $('smoothSlider').disabled = false;
            $('scaleSlider').disabled = false;

            renderOriginalToCache();
            processImage();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

function resetState() {
    state.originalImage = null;
    state.workImageData = null;
    state.maskData = null;
    state.resultCanvas = null;

    uploadZone.style.display = '';
    previewArea.style.display = 'none';
    holdBtn.style.display = 'none';

    $('downloadBtn').disabled = true;
    $('resetBtn').disabled = true;
    $('smoothSlider').disabled = true;
    $('scaleSlider').disabled = true;

    drawPlaceholder();
}

function segmentWithMediaPipe(imageData) {
    if (!state.segmenter) return null;
    const c = document.createElement('canvas');
    c.width = imageData.width; c.height = imageData.height;
    c.getContext('2d').putImageData(imageData, 0, 0);
    try {
        const result = state.segmenter.segment(c);
        const raw = result.categoryMask.getAsUint8Array();
        const mask = new Uint8Array(imageData.width * imageData.height);
        for (let i = 0; i < mask.length; i++) mask[i] = raw[i] > 0 ? 255 : 0;
        result.close();
        return mask;
    } catch (e) { return null; }
}

function getGrayscale(imageData) {
    const p = imageData.data;
    const g = new Uint8Array(imageData.width * imageData.height);
    for (let i = 0; i < g.length; i++) {
        const j = i * 4;
        g[i] = Math.round(p[j] * 0.299 + p[j + 1] * 0.587 + p[j + 2] * 0.114);
    }
    return g;
}

function otsuThreshold(gray) {
    const total = gray.length;
    const hist = new Uint32Array(256);
    for (let i = 0; i < total; i++) hist[gray[i]]++;
    let sumAll = 0;
    for (let i = 0; i < 256; i++) sumAll += i * hist[i];
    let sumB = 0, wB = 0, maxVar = 0, bestT = 128;
    for (let t = 0; t < 256; t++) {
        wB += hist[t];
        if (wB === 0) continue;
        const wF = total - wB;
        if (wF === 0) break;
        sumB += t * hist[t];
        const v = wB * wF * Math.pow(sumB / wB - (sumAll - sumB) / wF, 2);
        if (v > maxVar) { maxVar = v; bestT = t; }
    }
    return bestT;
}

function heuristicsMask(imageData) {
    const w = imageData.width, h = imageData.height;
    const gray = getGrayscale(imageData);
    const t = otsuThreshold(gray);
    const mask = new Uint8Array(w * h);
    for (let i = 0; i < gray.length; i++) mask[i] = gray[i] > t ? 255 : 0;
    const { labels, sizes } = labelComponents(mask, w, h);
    return keepLargestComponent(mask, labels, sizes, w, h);
}

function labelComponents(mask, w, h) {
    const labels = new Int32Array(w * h);
    const parent = [0], rank = [0];
    let next = 1;
    function find(i) {
        while (parent[i] !== i) { parent[i] = parent[parent[i]]; i = parent[i]; }
        return i;
    }
    function union(a, b) {
        const ra = find(a), rb = find(b);
        if (ra === rb) return;
        if (rank[ra] < rank[rb]) parent[ra] = rb;
        else if (rank[ra] > rank[rb]) parent[rb] = ra;
        else { parent[rb] = ra; rank[ra]++; }
    }
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const idx = y * w + x;
            if (mask[idx] === 0) continue;
            const left = x > 0 ? labels[y * w + (x - 1)] : 0;
            const up = y > 0 ? labels[(y - 1) * w + x] : 0;
            if (left === 0 && up === 0) {
                labels[idx] = next;
                parent[next] = next;
                rank[next] = 0;
                next++;
            } else if (left !== 0 && up === 0) labels[idx] = left;
            else if (left === 0 && up !== 0) labels[idx] = up;
            else if (left === up) labels[idx] = left;
            else { labels[idx] = left; union(left, up); }
        }
    }
    const sizes = new Map();
    for (let i = 0; i < labels.length; i++) {
        if (labels[i] !== 0) {
            const r = find(labels[i]);
            labels[i] = r;
            sizes.set(r, (sizes.get(r) || 0) + 1);
        }
    }
    return { labels, sizes };
}

function keepLargestComponent(mask, labels, sizes, w, h) {
    if (sizes.size === 0) return new Uint8Array(w * h);
    let maxL = 0, maxS = 0;
    for (const [l, s] of sizes) if (s > maxS) { maxS = s; maxL = l; }
    const out = new Uint8Array(w * h);
    for (let i = 0; i < labels.length; i++) out[i] = labels[i] === maxL ? 255 : 0;
    return out;
}

function morphOp(mask, w, h, radius, target) {
    const out = target === 255 ? new Uint8Array(w * h) : new Uint8Array(w * h).fill(255);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const y0 = Math.max(0, y - radius), y1 = Math.min(h - 1, y + radius);
            const x0 = Math.max(0, x - radius), x1 = Math.min(w - 1, x + radius);
            let found = false;
            for (let ny = y0; ny <= y1 && !found; ny++)
                for (let nx = x0; nx <= x1 && !found; nx++)
                    if (mask[ny * w + nx] === target) found = true;
            if (found) out[y * w + x] = target;
        }
    }
    return out;
}
function morphDilate(m, w, h, r) { return morphOp(m, w, h, r, 255); }
function morphErode(m, w, h, r) { return morphOp(m, w, h, r, 0); }

function boxBlur(mask, w, h, radius) {
    const out = new Uint8Array(w * h);
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const y0 = Math.max(0, y - radius), y1 = Math.min(h - 1, y + radius);
            const x0 = Math.max(0, x - radius), x1 = Math.min(w - 1, x + radius);
            let sum = 0, n = 0;
            for (let ny = y0; ny <= y1; ny++)
                for (let nx = x0; nx <= x1; nx++) { sum += mask[ny * w + nx]; n++; }
            out[y * w + x] = (sum / n) | 0;
        }
    }
    return out;
}

function findBoundingBox(mask, w, h) {
    let x0 = w, y0 = h, x1 = 0, y1 = 0, ok = false;
    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            if (mask[y * w + x] > 128) {
                ok = true;
                if (x < x0) x0 = x; if (y < y0) y0 = y;
                if (x > x1) x1 = x; if (y > y1) y1 = y;
            }
        }
    }
    return ok ? { x: x0, y: y0, w: x1 - x0 + 1, h: y1 - y0 + 1 } : null;
}

function processImage() {
    if (!state.workImageData) return;
    const s = getSettings();
    const w = state.workImageData.width, h = state.workImageData.height;

    let mask = null;

    if (state.mediaPipeReady) {
        mask = segmentWithMediaPipe(state.workImageData);
    }
    if (!mask) mask = heuristicsMask(state.workImageData);

    if (s.invert) {
        for (let i = 0; i < mask.length; i++) mask[i] = mask[i] === 255 ? 0 : 255;
    }

    const preMorph = new Uint8Array(mask);
    mask = morphDilate(mask, w, h, 3);
    mask = morphErode(mask, w, h, 3);
    mask = morphErode(mask, w, h, 1);
    mask = morphDilate(mask, w, h, 1);

    const bbox = findBoundingBox(mask, w, h);
    if (!bbox || bbox.w < 10 || bbox.h < 10) mask = preMorph;

    if (s.smoothRadius > 0) {
        const blurred = boxBlur(mask, w, h, s.smoothRadius);
        for (let i = 0; i < mask.length; i++) mask[i] = blurred[i] > 127 ? 255 : 0;
    }

    state.maskData = mask;
    compose();
}

function compose() {
    const mask = state.maskData;
    if (!mask) return;
    const srcW = state.workImageData.width;
    const srcH = state.workImageData.height;
    const s = getSettings();

    const bbox = findBoundingBox(mask, srcW, srcH);
    if (!bbox) { renderFallback(); return; }

    const sil = document.createElement('canvas');
    sil.width = srcW; sil.height = srcH;
    const sctx = sil.getContext('2d');
    const sd = sctx.createImageData(srcW, srcH);
    for (let i = 0; i < mask.length; i++) {
        if (mask[i] > 128) sd.data[i * 4 + 3] = 255;
    }
    sctx.putImageData(sd, 0, 0);

    const out = document.createElement('canvas');
    out.width = OUT; out.height = OUT;
    const octx = out.getContext('2d');
    octx.fillStyle = BG;
    octx.fillRect(0, 0, OUT, OUT);

    const pad = 1 - s.subjectScale / 100;
    const mw = OUT * (1 - pad * 2), mh = OUT * (1 - pad * 2);
    const sc = Math.min(mw / bbox.w, mh / bbox.h);
    const dw = bbox.w * sc, dh = bbox.h * sc;
    const dx = (OUT - dw) / 2, dy = OUT - dh;

    octx.imageSmoothingEnabled = true;
    octx.imageSmoothingQuality = 'high';
    octx.drawImage(sil, bbox.x, bbox.y, bbox.w, bbox.h, dx, dy, dw, dh);

    state.resultCanvas = out;
    renderResult();
}

function renderFallback() {
    const ctx = resultCanvas.getContext('2d');
    ctx.fillStyle = '#fffef7';
    ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '700 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('No subject detected', resultCanvas.width / 2, resultCanvas.height / 2);
}

function drawPlaceholder() {
    const ctx = resultCanvas.getContext('2d');
    ctx.fillStyle = '#fffef7';
    ctx.fillRect(0, 0, resultCanvas.width, resultCanvas.height);
    ctx.fillStyle = '#1a1a1a';
    ctx.font = '700 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Drop a photo to generate silhouette', resultCanvas.width / 2, resultCanvas.height / 2);
}

function renderOriginalToCache() {
    if (!state.originalImage) return;
    const sz = originalCanvas.width;
    const ctx = originalCanvas.getContext('2d');
    ctx.fillStyle = '#fffef7';
    ctx.fillRect(0, 0, sz, sz);
    const img = state.originalImage, a = img.width / img.height;
    let dw, dh, dx, dy;
    if (a > 1) { dw = sz; dh = sz / a; dx = 0; dy = (sz - dh) / 2; }
    else { dh = sz; dw = sz * a; dx = (sz - dw) / 2; dy = 0; }
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, dx, dy, dw, dh);
}

function renderResult() {
    if (!state.resultCanvas) return;
    const ctx = resultCanvas.getContext('2d');
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(state.resultCanvas, 0, 0, resultCanvas.width, resultCanvas.height);
}

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(state.toastTimer);
    state.toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function downloadPNG() {
    if (!state.resultCanvas) return;
    state.resultCanvas.toBlob(function(blob) {
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u; a.download = 'teh-hijau-silhouette.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(u);
        showToast('Downloaded PNG (1024\u00d71024)');
    }, 'image/png');
}

// ============================================================================
// EVENTS
// ============================================================================
fileInput.addEventListener('change', function() {
    if (this.files && this.files[0]) handleFile(this.files[0]);
});
uploadZone.addEventListener('click', function() { fileInput.click(); });
document.addEventListener('paste', function(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
        if (item.type.startsWith('image/')) { handleFile(item.getAsFile()); break; }
    }
});
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
    e.preventDefault();
    if (e.dataTransfer && e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

function debouncedProcess() {
    clearTimeout(state.debounceTimer);
    state.debounceTimer = setTimeout(processImage, 80);
}

$('smoothSlider').addEventListener('input', function() {
    $('smoothVal').textContent = this.value + 'px';
    debouncedProcess();
});
$('scaleSlider').addEventListener('input', function() {
    $('scaleVal').textContent = this.value + '%';
    debouncedProcess();
});
$('invertToggle').addEventListener('change', debouncedProcess);
$('downloadBtn').addEventListener('click', downloadPNG);
$('resetBtn').addEventListener('click', resetState);

// Hold-to-see-original
function showOriginal() {
    if (!state.originalImage) return;
    resultCanvas.style.display = 'none';
    originalCanvas.style.display = 'block';
}
function hideOriginal() {
    resultCanvas.style.display = 'block';
    originalCanvas.style.display = 'none';
}
holdBtn.addEventListener('mousedown', showOriginal);
holdBtn.addEventListener('mouseup', hideOriginal);
holdBtn.addEventListener('mouseleave', hideOriginal);
holdBtn.addEventListener('touchstart', function(e) { e.preventDefault(); showOriginal(); });
holdBtn.addEventListener('touchend', hideOriginal);
holdBtn.addEventListener('touchcancel', hideOriginal);

drawPlaceholder();
updateStatusBar();
</script>

</body>
</html>
